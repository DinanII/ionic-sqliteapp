<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
      My SQL App
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Input section for new product name -->
  <ion-item>
    <ion-input [(ngModel)]="newProduct" ></ion-input>
  </ion-item>
<ion-button
  expand="full"
  (click)="addProduct()">
  Add dummy product
</ion-button>
  <!-- All Products -->
    <ion-list>
      @for (p of products; track $index) {
      <ion-item-sliding>
        <ion-item [routerLink]="[`/product/${p.id}`]">
          <ion-label>
            {{ p.name }}
            <p>{{ p.value | currency }}</p>
          </ion-label>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option (click)="deleteProduct(p)" color="danger">Delete</ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
      }
    </ion-list>
  <!-- Database export -->
  <ion-button expand="full" (click)="createExport('full')">Create Full JSON Export</ion-button>
  <ion-button expand="full" (click)="createExport('partial')">Create Partial JSON Export</ion-button>
  <ion-button expand="full" (click)="deleteDatabase()" color="danger">Delete Database</ion-button>

  @if(export) {
    <!-- Here gets the JSON dumped if the DB is exported -->
  <ion-card>
    <ion-card-content>
      {{ export | json}}
    </ion-card-content>
  </ion-card>
  }


</ion-content>
